name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify workflow-based Pages is enabled
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if ! build_type="$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq .build_type)"; then
            echo "::error title=GitHub Pages setup required::Set Settings > Pages > Build and deployment > Source to GitHub Actions, confirm the github-pages environment allows deployments, then rerun this workflow. See README.md#publishing-the-how-to-play-page."
            exit 1
          fi
          if [[ "${build_type}" != "workflow" ]]; then
            echo "::error title=GitHub Pages source is ${build_type}::Set Settings > Pages > Build and deployment > Source to GitHub Actions, then rerun this workflow. See README.md#publishing-the-how-to-play-page."
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
