name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'assets/branding/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Stage self-contained site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/site/assets/branding"
          cp -R site/. "${RUNNER_TEMP}/site/"
          cp assets/branding/*.png "${RUNNER_TEMP}/site/assets/branding/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ runner.temp }}/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
