name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PAPER_VERSION: '1.21.11'
  PAPER_BUILD: '132'
  PAPER_SHA256: '5ffef465eeeb5f2a3c23a24419d97c51afd7dbb4923ff42df9a3f58bba1ccfba'
  PAPER_BOOT_TIMEOUT_SECONDS: ${{ vars.PAPER_BOOT_TIMEOUT_SECONDS || '300' }}
  BATTLE_QUEUE_TIMEOUT_SECONDS: ${{ vars.BATTLE_QUEUE_TIMEOUT_SECONDS || '30' }}
  RCON_SMOKE_PORT: ${{ vars.RCON_SMOKE_PORT || '25575' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build and test
        run: make ci-fast

      - name: Run judge fixture offline
        shell: bash
        run: |
          set -euo pipefail
          test -x judge/build/install/judge/bin/judge
          cp -R judge/src/test/resources/fixtures/runtime \
            "${RUNNER_TEMP}/judge-runtime"
          SCENARIOCRAFT_JUDGE_CONFIG_DIR="${GITHUB_WORKSPACE}/judge" \
            judge/build/install/judge/bin/judge \
              --round "${RUNNER_TEMP}/judge-runtime/rounds/round-20260721-193000" \
              --dry-run

      - name: Stage tested plugin and judge
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t plugin_jars < <(
            find build/libs -maxdepth 1 -type f -name 'ScenarioCraft-*.jar' \
              ! -name '*-sources.jar' ! -name '*-javadoc.jar' -print
          )
          test "${#plugin_jars[@]}" -eq 1
          mkdir -p "${RUNNER_TEMP}/plugin-artifact"
          cp "${plugin_jars[0]}" "${RUNNER_TEMP}/plugin-artifact/ScenarioCraft.jar"
          cp -R judge/build/install/judge \
            "${RUNNER_TEMP}/plugin-artifact/judge"

      - name: Upload tested runtime
        uses: actions/upload-artifact@v6
        with:
          name: scenariocraft-plugin
          path: ${{ runner.temp }}/plugin-artifact
          if-no-files-found: error

  smoke:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Download tested runtime
        uses: actions/download-artifact@v6
        with:
          name: scenariocraft-plugin
          path: ${{ runner.temp }}/plugin-artifact

      - name: Cache Paper server jar
        id: paper-cache
        uses: actions/cache@v5
        with:
          path: .paper-cache/paper-${{ env.PAPER_VERSION }}-${{ env.PAPER_BUILD }}.jar
          key: paper-${{ runner.os }}-${{ env.PAPER_VERSION }}-${{ env.PAPER_BUILD }}-${{ env.PAPER_SHA256 }}

      - name: Ensure pinned Paper server
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .paper-cache
          paper_jar=".paper-cache/paper-${PAPER_VERSION}-${PAPER_BUILD}.jar"
          if test -f "${paper_jar}" &&
            echo "${PAPER_SHA256}  ${paper_jar}" | sha256sum --check --status; then
            printf 'Using checksum-verified cached Paper jar.\n'
            exit 0
          fi

          rm -f "${paper_jar}"
          builds="$(
            curl --fail --silent --show-error --location \
              --retry 3 --retry-all-errors --retry-delay 2 \
              --header 'User-Agent: ScenarioCraft-CI/1.0 (https://github.com/agorokh/scenariocraft)' \
              "https://fill.papermc.io/v3/projects/paper/versions/${PAPER_VERSION}/builds"
          )"
          jq -e 'type == "array"' <<<"${builds}" >/dev/null || {
            printf 'Paper builds API returned an unexpected payload.\n'
            exit 1
          }
          url="$(
            jq -er --argjson build "${PAPER_BUILD}" \
              '.[] |
               select(.id == $build) |
               .downloads["server:default"] |
               select(type == "object") |
               .url |
               select(type == "string" and
                      test("^https://[^[:space:]]+$"))' \
              <<<"${builds}"
          )"
          test -n "${url}" || {
            printf 'Paper %s build %s has no server download URL.\n' \
              "${PAPER_VERSION}" "${PAPER_BUILD}"
            exit 1
          }
          curl --fail --show-error --location \
            --retry 3 --retry-all-errors --retry-delay 2 \
            --header 'User-Agent: ScenarioCraft-CI/1.0 (https://github.com/agorokh/scenariocraft)' \
            --output "${paper_jar}" \
            "${url}"
          echo "${PAPER_SHA256}  ${paper_jar}" | sha256sum --check -

      - name: Boot Paper and exercise results over RCON
        id: paper-smoke
        shell: bash
        run: |
          set -euo pipefail
          server_dir="${RUNNER_TEMP}/paper-smoke"
          echo "server_dir=${server_dir}" >>"${GITHUB_OUTPUT}"
          [[ "${RCON_SMOKE_PORT}" =~ ^[1-9][0-9]*$ ]] &&
            test "${RCON_SMOKE_PORT}" -le 65535 || {
              printf 'RCON_SMOKE_PORT must be between 1 and 65535.\n' >&2
              exit 1
            }
          mkdir -p "${server_dir}/plugins/ScenarioCraft/rounds"
          cp ".paper-cache/paper-${PAPER_VERSION}-${PAPER_BUILD}.jar" \
            "${server_dir}/paper.jar"
          cp "${RUNNER_TEMP}/plugin-artifact/ScenarioCraft.jar" \
            "${server_dir}/plugins/ScenarioCraft.jar"
          chmod +x "${RUNNER_TEMP}/plugin-artifact/judge/bin/judge"
          cp src/main/resources/config.yml \
            "${server_dir}/plugins/ScenarioCraft/config.yml"
          sed -i.bak \
            -e 's/^gather-seconds: .*/gather-seconds: 1/' \
            -e 's/^note-seconds: .*/note-seconds: 1/' \
            -e 's/^build-seconds: .*/build-seconds: 1/' \
            -e 's/^reveal-linger-seconds: .*/reveal-linger-seconds: 60/' \
            -e 's/^results-poll-ticks: .*/results-poll-ticks: 1/' \
            "${server_dir}/plugins/ScenarioCraft/config.yml"
          rm "${server_dir}/plugins/ScenarioCraft/config.yml.bak"
          fixture_source="${server_dir}/judge-fixture"
          cp -R \
            judge/src/test/resources/fixtures/runtime/rounds/round-20260721-193000 \
            "${fixture_source}"
          rcon_smoke_password="$(openssl rand -hex 32)"
          test -n "${rcon_smoke_password}"
          printf 'eula=true\n' >"${server_dir}/eula.txt"
          printf '%s\n' \
            'allow-nether=false' \
            'generate-structures=false' \
            'enable-rcon=true' \
            'level-type=minecraft:flat' \
            'online-mode=false' \
            "rcon.port=${RCON_SMOKE_PORT}" \
            "rcon.password=${rcon_smoke_password}" \
            'simulation-distance=2' \
            'spawn-monsters=false' \
            'view-distance=2' >"${server_dir}/server.properties"
          printf 'settings:\n  allow-end: false\n' >"${server_dir}/bukkit.yml"
          mkfifo "${server_dir}/server.stdin"

          set +e
          [[ "${PAPER_BOOT_TIMEOUT_SECONDS}" =~ ^[1-9][0-9]*$ ]] || {
            printf 'PAPER_BOOT_TIMEOUT_SECONDS must be a positive integer.\n'
            exit 1
          }
          [[ "${BATTLE_QUEUE_TIMEOUT_SECONDS}" =~ ^[1-9][0-9]*$ ]] || {
            printf 'BATTLE_QUEUE_TIMEOUT_SECONDS must be a positive integer.\n'
            exit 1
          }
          # shellcheck disable=SC2016
          timeout --signal=TERM --kill-after=10s \
            "${PAPER_BOOT_TIMEOUT_SECONDS}s" bash -c '
            set -euo pipefail
            cd "$1"
            exec 3<>server.stdin
            if ! { printf "" >&3; } 2>/dev/null; then
              printf "Paper command pipe fd 3 is unavailable.\n" >&2
              exit 1
            fi
            java -Xms512M -Xmx1G -jar paper.jar --nogui <&3 >server-console.log 2>&1 &
            server_pid=$!
            cleanup() {
              if kill -0 "${server_pid}" 2>/dev/null; then
                printf "stop\n" >&3 || true
                kill -TERM "${server_pid}" 2>/dev/null || true
                for _ in 1 2 3 4 5; do
                  kill -0 "${server_pid}" 2>/dev/null || return
                  sleep 1
                done
                kill -KILL "${server_pid}" 2>/dev/null || true
              fi
            }
            trap cleanup EXIT TERM INT
            battle_log_offset=0
            while kill -0 "${server_pid}" 2>/dev/null; do
              if test -f logs/latest.log &&
                grep -q "Done (" logs/latest.log &&
                grep -q "ScenarioCraft enabled" logs/latest.log; then
                battle_log_offset=$(wc -c <logs/latest.log)
                probe_seen=0
                for ((probe_attempt = 0; probe_attempt < 10; probe_attempt++)); do
                  printf "%s\n" \
                    "minecraft:execute in minecraft:battle_world run minecraft:fill -1 99 -1 5 102 6 minecraft:air" \
                    "minecraft:execute in minecraft:battle_world run minecraft:summon minecraft:armor_stand 0 100 0 {Tags:[\"scenariocraft_transport_probe\"],Invisible:1b,Marker:1b,NoGravity:1b}" \
                    "minecraft:execute in minecraft:battle_world run minecraft:tp @e[type=minecraft:armor_stand,tag=scenariocraft_transport_probe,limit=1] 3 100 4" \
                    "minecraft:execute in minecraft:battle_world positioned 3 100 4 if entity @e[type=minecraft:armor_stand,tag=scenariocraft_transport_probe,distance=..0.1,limit=1] run say SCENARIOCRAFT_TELEPORT_TRANSPORT_OK" >&3
                  sleep 1
                  new_battle_log=$(
                    tail -c "+$((battle_log_offset + 1))" logs/latest.log 2>/dev/null ||
                      true
                  )
                  if grep -q "SCENARIOCRAFT_TELEPORT_TRANSPORT_OK" \
                    <<<"${new_battle_log}"; then
                    probe_seen=1
                    break
                  fi
                  kill -0 "${server_pid}" 2>/dev/null || break
                done
                if test "${probe_seen}" -ne 1; then
                  printf "Teleport transport probe did not succeed within 10 seconds.\n" >&2
                  tail -n 100 logs/latest.log >&2 || true
                  exit 1
                fi
                battle_log_offset=$(wc -c <logs/latest.log)
                printf "battle start\n" >&3
                break
              fi
              sleep 1
            done
            queue_seen=0
            queue_failure=timeout
            for ((attempt = 0; attempt < BATTLE_QUEUE_TIMEOUT_SECONDS; attempt++)); do
              new_battle_log=$(
                tail -c "+$((battle_log_offset + 1))" logs/latest.log 2>/dev/null ||
                  true
              )
              if grep -q "Arena build queued: 2 plots in battle_world" \
                <<<"${new_battle_log}"; then
                queue_seen=1
                break
              fi
              if ! kill -0 "${server_pid}" 2>/dev/null; then
                queue_failure=server-exited
                break
              fi
              if grep -Fq \
                -e "Unknown command" \
                -e "Unknown or incomplete command" <<<"${new_battle_log}"; then
                queue_failure=unknown-command
                break
              fi
              if grep -q "Arena chunk preparation failed" <<<"${new_battle_log}"; then
                queue_failure=preparation-failed
                break
              fi
              sleep 1
            done
            if test "${queue_seen}" -ne 1; then
              case "${queue_failure}" in
                unknown-command)
                  printf "Paper rejected battle start as an unknown command.\n" >&2
                  ;;
                preparation-failed)
                  printf "Arena chunk preparation failed before the build queued.\n" >&2
                  ;;
                server-exited)
                  printf "Paper exited before battle start queued.\n" >&2
                  ;;
                *)
                  printf "battle start did not queue within %s seconds.\n" \
                    "${BATTLE_QUEUE_TIMEOUT_SECONDS}" >&2
                  ;;
              esac
              exit 1
            fi
            while kill -0 "${server_pid}" 2>/dev/null; do
              new_battle_log=$(
                tail -c "+$((battle_log_offset + 1))" logs/latest.log 2>/dev/null ||
                  true
              )
              if grep -q "Arena build complete: 2 plots in battle_world" \
                <<<"${new_battle_log}"; then
                break
              fi
              if grep -Fq \
                -e "Arena chunk preparation failed" \
                -e "Arena block mutation failed" <<<"${new_battle_log}"; then
                printf "Arena build failed before completion.\n" >&2
                exit 1
              fi
              sleep 1
            done

            reveal_seen=0
            for ((attempt = 0; attempt < 60; attempt++)); do
              if grep -q "Round phase changed: BUILDING -> REVEAL" logs/latest.log; then
                reveal_seen=1
                break
              fi
              kill -0 "${server_pid}" 2>/dev/null || break
              sleep 1
            done
            if test "${reveal_seen}" -ne 1; then
              printf "Build Battle did not reach REVEAL for judge announcement.\n" >&2
              tail -n 100 logs/latest.log >&2 || true
              exit 1
            fi

            active_round_id=""
            for ((attempt = 0; attempt < 60; attempt++)); do
              if active_round_id="$(
                grep -Eo \
                  "plugins/ScenarioCraft/rounds/round-[0-9]{8}-[0-9]{6}" \
                  logs/latest.log | tail -n 1 | awk -F/ "{print \$NF}"
              )" &&
                [[ "${active_round_id}" =~ ^round-[0-9]{8}-[0-9]{6}$ ]]; then
                break
              fi
              kill -0 "${server_pid}" 2>/dev/null || break
              sleep 1
            done
            if [[ ! "${active_round_id}" =~ ^round-[0-9]{8}-[0-9]{6}$ ]]; then
              printf "Active round export did not complete before judging.\n" >&2
              tail -n 100 logs/latest.log >&2 || true
              exit 1
            fi
            judge_round="$1/plugins/ScenarioCraft/rounds/${active_round_id}"
            cp -R "$1/judge-fixture/." "${judge_round}/"
            jq --arg round_id "${active_round_id}" \
              ".round_id = \$round_id" \
              "${judge_round}/manifest.json" >"${judge_round}/manifest.json.tmp"
            mv "${judge_round}/manifest.json.tmp" "${judge_round}/manifest.json"
            SCENARIOCRAFT_JUDGE_CONFIG_DIR="$2" \
              SCENARIOCRAFT_RCON_HOST=127.0.0.1 \
              SCENARIOCRAFT_RCON_PORT="$4" \
              SCENARIOCRAFT_RCON_PASSWORD="$5" \
              SCENARIOCRAFT_RCON_TIMEOUT_SECONDS=5 \
              "$3" --round "${judge_round}" --dry-run \
                >judge-rcon-success.out 2>judge-rcon-success.err
            if grep -q "RCON announcement failed" judge-rcon-success.err; then
              printf "Configured RCON announcement failed.\n" >&2
              cat judge-rcon-success.err >&2
              exit 1
            fi

            announcement_seen=0
            for ((attempt = 0; attempt < 30; attempt++)); do
              if grep -q \
                "SCENARIOCRAFT_RESULTS_ANNOUNCED ${active_round_id}" \
                logs/latest.log; then
                announcement_seen=1
                break
              fi
              kill -0 "${server_pid}" 2>/dev/null || break
              sleep 1
            done
            if test "${announcement_seen}" -ne 1; then
              printf "Judge verdict was not announced during REVEAL.\n" >&2
              tail -n 100 logs/latest.log >&2 || true
              exit 1
            fi

            set +e
            SCENARIOCRAFT_JUDGE_CONFIG_DIR="$2" \
              SCENARIOCRAFT_RCON_HOST=127.0.0.1 \
              SCENARIOCRAFT_RCON_PORT="$4" \
              SCENARIOCRAFT_RCON_PASSWORD=intentionally-wrong \
              SCENARIOCRAFT_RCON_TIMEOUT_SECONDS=5 \
              "$3" --round "${judge_round}" --dry-run \
                >judge-rcon-failure.out 2>judge-rcon-failure.err
            rcon_failure_status=$?
            set -e
            if test "${rcon_failure_status}" -ne 0 ||
              ! grep -q "results remain available on disk" judge-rcon-failure.err ||
              ! test -s "${judge_round}/results.json" ||
              ! test -s "${judge_round}/results.txt"; then
              printf "RCON failure did not preserve successful disk results.\n" >&2
              cat judge-rcon-failure.err >&2 || true
              exit 1
            fi

            replay_log_offset=$(wc -c <logs/latest.log)
            printf "battle results\n" >&3
            replay_seen=0
            for ((attempt = 0; attempt < 10; attempt++)); do
              replay_log=$(
                tail -c "+$((replay_log_offset + 1))" logs/latest.log 2>/dev/null ||
                  true
              )
              if grep -q "Winner: Alex!" <<<"${replay_log}"; then
                replay_seen=1
                break
              fi
              kill -0 "${server_pid}" 2>/dev/null || break
              sleep 1
            done
            if test "${replay_seen}" -ne 1; then
              printf "/battle results did not replay the winner.\n" >&2
              tail -n 100 logs/latest.log >&2 || true
              exit 1
            fi
            if test "$(grep -c \
              "SCENARIOCRAFT_RESULTS_ANNOUNCED ${active_round_id}" \
              logs/latest.log)" -ne 1; then
              printf "RCON and polling produced duplicate announcements.\n" >&2
              exit 1
            fi
            printf "stop\n" >&3
            wait "${server_pid}"
          ' bash \
            "${server_dir}" \
            "${GITHUB_WORKSPACE}/judge" \
            "${RUNNER_TEMP}/plugin-artifact/judge/bin/judge" \
            "${RCON_SMOKE_PORT}" \
            "${rcon_smoke_password}"
          server_status=$?
          set -e
          sleep 2
          sync

          log="${server_dir}/logs/latest.log"
          test -f "${log}" || {
            printf 'Paper did not create logs/latest.log (exit %s).\n' "${server_status}"
            test -f "${server_dir}/server-console.log" &&
              tail -n 80 "${server_dir}/server-console.log"
            exit 1
          }

          failed=0
          if test "${server_status}" -ne 0; then
            printf 'Paper wrapper exited with status %s; log assertions remain authoritative.\n' \
              "${server_status}"
            tail -n 80 "${server_dir}/server-console.log"
          fi
          if ! grep -Eq '\[ScenarioCraft\] Enabling ScenarioCraft v' "${log}"; then
            printf 'ScenarioCraft enable line was not found.\n'
            grep -n -C 4 -E 'ScenarioCraft|Enabling|Disabling' "${log}" || true
            failed=1
          fi
          if ! grep -q 'ScenarioCraft enabled' "${log}"; then
            printf 'ScenarioCraft post-onEnable readiness line was not found.\n'
            grep -n -C 4 -E 'ScenarioCraft|Enabling|Disabling|ERROR|Exception' \
              "${log}" || true
            failed=1
          fi
          if ! grep -q 'SCENARIOCRAFT_TELEPORT_TRANSPORT_OK' "${log}"; then
            printf 'The exact namespaced execute-in-world teleport path was not confirmed.\n'
            grep -n -C 4 -E \
              'SCENARIOCRAFT_TELEPORT_TRANSPORT_OK|Unknown or incomplete command|No entity was found' \
              "${log}" || true
            failed=1
          fi
          smoke_round_id="$(
            { grep -Eo \
                'plugins/ScenarioCraft/rounds/round-[0-9]{8}-[0-9]{6}' \
                "${log}" || true; } |
              tail -n 1 | awk -F/ '{print $NF}'
          )"
          if [[ ! "${smoke_round_id}" =~ ^round-[0-9]{8}-[0-9]{6}$ ]]; then
            printf 'The active smoke round ID could not be recovered from the log.\n'
            failed=1
          elif ! grep -q \
            "SCENARIOCRAFT_RESULTS_ANNOUNCED ${smoke_round_id}" "${log}"; then
            printf 'The judge result was not announced on the real Paper server.\n'
            grep -n -C 4 -E 'SCENARIOCRAFT_RESULTS|RCON|Winner|ERROR|Exception' \
              "${log}" || true
            failed=1
          fi
          if ! grep -q 'Winner: Alex!' "${log}"; then
            printf '/battle results did not replay the durable winner.\n'
            grep -n -C 4 -E 'Build Battle results|Winner|ERROR|Exception' \
              "${log}" || true
            failed=1
          fi
          if ! grep -q 'Done (' "${log}"; then
            printf 'Paper did not reach Done.\n'
            grep -n -C 4 -E 'Done|ERROR|Exception' "${log}" || true
            failed=1
          fi
          queued_line="$(
            grep -E \
              'Arena build queued: 2 plots in battle_world, [0-9]+ block mutations at 4000 per tick' \
              "${log}" | tail -n 1 || true
          )"
          complete_line="$(
            grep -E \
              'Arena build complete: 2 plots in battle_world \([0-9]+ block mutations\)' \
              "${log}" | tail -n 1 || true
          )"
          queued_mutations="$(
            printf '%s\n' "${queued_line}" |
              sed -nE \
                's/^.*Arena build queued: 2 plots in battle_world, ([0-9]+) block mutations at 4000 per tick.*$/\1/p'
          )"
          complete_mutations="$(
            printf '%s\n' "${complete_line}" |
              sed -nE \
                's/^.*Arena build complete: 2 plots in battle_world \(([0-9]+) block mutations\).*$/\1/p'
          )"
          if test -z "${queued_line}" ||
            test -z "${complete_line}"; then
            printf 'The two-plot batched arena build did not complete as expected.\n'
            grep -n -C 4 -E 'Arena build|battle_world|ERROR|Exception' "${log}" || true
            failed=1
          elif ! [[ "${queued_mutations}" =~ ^[0-9]+$ ]] ||
            ! [[ "${complete_mutations}" =~ ^[0-9]+$ ]]; then
            printf 'Could not extract numeric arena mutation totals from the smoke log.\n'
            grep -n -C 2 -E 'Arena build queued|Arena build complete' "${log}" || true
            failed=1
          elif test "${queued_mutations}" != "${complete_mutations}"; then
            printf 'Queued and completed arena mutation totals differ: %s vs %s.\n' \
              "${queued_mutations}" "${complete_mutations}"
            failed=1
          fi
          if grep -n -C 4 -E \
            'A single server tick took|The server has stopped responding|Watchdog Thread' \
            "${log}"; then
            printf 'Paper reported a watchdog stall during arena construction.\n'
            failed=1
          fi
          if ! grep -q 'Stopping server' "${log}" ||
            ! grep -q 'All dimensions are saved' "${log}"; then
            printf 'Paper did not complete the expected clean shutdown path.\n'
            grep -n -C 4 -E 'Stopping|Saving|saved|Disabling|ERROR|Exception' \
              "${log}" || true
            failed=1
          fi
          if grep -n -C 4 -E \
            'Could not load|Ambiguous plugin name|Unsupported api-version|Error occurred while enabling|Error occurred while disabling' \
            "${log}"; then
            printf 'Paper reported a plugin loading or compatibility error.\n'
            failed=1
          fi
          exit "${failed}"

      - name: Upload Paper smoke log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: paper-smoke-${{ env.PAPER_VERSION }}-${{ env.PAPER_BUILD }}
          path: |
            ${{ steps.paper-smoke.outputs.server_dir }}/logs/latest.log
            ${{ steps.paper-smoke.outputs.server_dir }}/server-console.log
            ${{ steps.paper-smoke.outputs.server_dir }}/judge-rcon-success.out
            ${{ steps.paper-smoke.outputs.server_dir }}/judge-rcon-success.err
            ${{ steps.paper-smoke.outputs.server_dir }}/judge-rcon-failure.out
            ${{ steps.paper-smoke.outputs.server_dir }}/judge-rcon-failure.err
          if-no-files-found: error
