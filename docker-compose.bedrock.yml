services:
  bedrock-plugins:
    image: alpine:3.23
    command:
      - /bin/sh
      - -ceu
      - |
        url='https://download.geysermc.org/v2/projects/floodgate/versions/2.2.5/builds/138/downloads/spigot'
        expected='44bdb908e2fb4ff1b974d5313d048a625a21555a9844cfb86256a98e8e1c6bd1'
        target='/plugins/floodgate-spigot.jar'
        temporary="$${target}.download"
        rm -f "$${temporary}"
        wget -q -O "$${temporary}" "$${url}"
        echo "$${expected}  $${temporary}" | sha256sum -c -
        mv "$${temporary}" "$${target}"
    volumes:
      - plugins:/plugins

  paper:
    depends_on:
      bedrock-plugins:
        condition: service_completed_successfully
    environment:
      MODRINTH_PROJECTS: geyser,viaversion
      MODRINTH_ALLOWED_VERSION_TYPE: beta
      MODRINTH_DEFAULT_VERSION_TYPE: beta
    ports:
      - "${SCENARIOCRAFT_BEDROCK_PORT:-19132}:19132/udp"
