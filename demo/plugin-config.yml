plot-size: 21
wall-height: 20
plot-spacing: 40
max-plots: 8
blocks-per-tick: 6000

gather-seconds: 5
note-seconds: 5
build-seconds: 90
# Keep REVEAL open through the production judge's bounded retry budget so the
# RCON-triggered announcement can still run after a slow live verdict.
reveal-linger-seconds: 900

tasks:
  - A rocket-powered castle
  - A friendly monster school
  - A moon base for cats

exempt-names: []
allow-any-start: true
demo-mode: true
