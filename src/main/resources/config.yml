# Arena geometry and block-edit budget
# ScenarioCraft also requires vanilla minecraft:execute and minecraft:tp to
# remain available to the server console; plugin startup fails if either is missing.
plot-size: 33
# The roof occupies floor-y + wall-height + 1; that Y must stay below the
# battle world's exclusive maximum height. The startup error gives the exact
# reduction if an existing value is too tall.
wall-height: 30
plot-spacing: 64
max-plots: 8
blocks-per-tick: 4000

# Phase timings used by the Build Battle round controller
gather-seconds: 30
note-seconds: 60
build-seconds: 1200
reveal-linger-seconds: 900
# Frequency for checking newly published judge results while the round is in REVEAL
results-poll-ticks: 20

# Judge-result polling stays lightweight and only runs while a round is in REVEAL.
results-poll-seconds: 2
results-celebration-bursts: 3
results-celebration-interval-ticks: 10

