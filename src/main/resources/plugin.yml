name: ScenarioCraft
version: '0.1.0-SNAPSHOT'
main: io.github.agorokh.scenariocraft.ScenarioCraftPlugin
description: Kid-invented game scenarios for Paper servers, warmly judged by AI.
api-version: '1.21.11'
author: ScenarioCraft contributors
website: https://github.com/agorokh/scenariocraft
commands:
  speedbuild:
    description: Controls the current ScenarioCraft Speed Build round.
    usage: /<command> start|stop|results
    aliases:
      - battle
      - buildbattle
      - bb
permissions:
  scenariocraft.alerts:
    description: Receives ScenarioCraft teleport and recovery alerts.
    default: op
